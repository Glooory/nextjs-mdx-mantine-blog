<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <linearGradient id="g-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e0e14"/>
      <stop offset="100%" stop-color="#16162a"/>
    </linearGradient>

    <linearGradient id="g-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>

    <filter id="f-glow" x="-20%" y="-100%" width="140%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

  </defs>

  <rect width="32" height="32" rx="7.5" fill="url(#g-bg)"/>

  <rect x="7" y="9" width="18" height="2.5" rx="1.25"
        fill="url(#g-accent)" filter="url(#f-glow)"/>

  <rect x="7" y="14.5" width="11" height="2" rx="1"
        fill="#e2e8f0" opacity="0.55"/>

  <rect x="7" y="19.5" width="14" height="2" rx="1"
        fill="#e2e8f0" opacity="0.35"/>

</svg>
